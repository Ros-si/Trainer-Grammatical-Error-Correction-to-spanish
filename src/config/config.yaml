artifacts_root: artifacts

data_ingestion:
  root_dir: artifacts/data_ingestion
  source_URL: "Ro551/Wiki-Corrupted_spanish_to_GEC-GED" #"Ro551/WikiCorrupted_spanish_to_GEC-GED_xs"
  source_cowsl2h: "Ro551/COWSL2H_GEC_cleaned"
  dataset_cache_dir: artifacts/data_ingestion/hf_dataset
  dataset_test_cache_dir: artifacts/data_ingestion/hf_dataset_test
  mode: "merged"

data_transformation:
  root_dir: artifacts/data_transformation
  tokenizer_name: "google/mt5-small" #"Helsinki-NLP/opus-mt-es-en"  #"facebook/m2m100_418M" #
  model_id: "marianMT" #"mT5-small" #"facebook/m2m100_418M" #"Helsinki-NLP/opus-mt-es-en"
  save_to_disk: true  
  max_input_length: 128
  max_target_length: 128

model_trainer:
  root_dir: artifacts/model_trainer
  model_ckpt: "google/mt5-small" #"Helsinki-NLP/opus-mt-es-en" 
  run_name: "merged" #"dsSint"
  project_name: "GEC-Spanish-trainer-LoRA"
  num_train_epochs: 4
  lr: 0.0002749471 #0.00015888 #0.000028126
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 6
  generation_max_length: 128
  weight_decay: 0.045577985 #0.0977850 #0.0383990 #0.070
  optim: "adamw_torch"
  fp16: true
  load_best_model: true
  push_to_hub: true
  use_lora: false
  lora_config:
    r: 8
    lora_alpha: 64
    lora_dropout: 0.15
    bias: "none"

model_evaluation:
  root_dir: artifacts/model_evaluation
  model_path: artifacts/model_trainer
  tokenizer_path: artifacts/model_trainer
  source_file: "source.txt"
  gold_file: "gold.txt"
  pred_file: "pred.txt"
  metric_file_name: "metrics.json"

hyperparameter_tuning:
  root_dir: artifacts/hyperparameter_tuning
  source_synthetic: "Ro551/WikiCorrupted_spanish_to_GEC-GED_mini"
  source_cowsl2h: "Ro551/COWSL2H_GEC_cleaned" 
  mode: "hybrid" # puede ser "synthetic", "cowsl2h", "hybrid"
  models_ckpt: ["facebook/m2m100_418M"] #"facebook/mbart-large-50"] "google/mt5-small", "Helsinki-NLP/opus-mt-es-en", 
  project_name: "Hypertuning_GEC-dataHybrid"  #"Hypertuning_GEC-LoRA" 
  epochs: 3
  n_trials: 10
  lr: [0.00001, 0.001]  #[0.0001, 0.002] #->lora #[0.00015, 0.0003]mt5 # general:[0.00001, 0.001] 
  wd: [0.01, 0.1]
  bs: [1, 2]
  gradient_accumulation_steps: [4, 16]
  use_lora: false
  lora_config:
    r: [8, 16]
    lora_alpha: [16, 32, 64, 96]
    lora_dropout: [0.05, 0.15]
    bias: "none"
