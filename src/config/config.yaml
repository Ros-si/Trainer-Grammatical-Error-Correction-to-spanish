artifacts_root: artifacts

data_ingestion:
  root_dir: artifacts/data_ingestion
  source_URL: "Ro551/WikiCorrupted_spanish_to_GEC-GED_large" #"Ro551/WikiCorrupted_spanish_to_GEC-GED" #"Ro551/Wiki-Corrupted_spanish_to_GEC-GED"
  source_cowsl2h: "Ro551/COWSL2H_GEC_cleaned"
  dataset_cache_dir: artifacts/data_ingestion/hf_dataset
  dataset_test_cache_dir: artifacts/data_ingestion/hf_dataset_test
  mode: "synthetic" #puede ser "synthetic", "cowsl2h", "merged"

data_transformation:
  root_dir: artifacts/data_transformation
  tokenizer_name: "Helsinki-NLP/opus-mt-es-en" #"google/mt5-small" #"Helsinki-NLP/opus-mt-es-en"  #"facebook/m2m100_418M" #
  model_id: "marianMT" #"mT5-small" #"marianMT" "facebook/m2m100_418M" #"Helsinki-NLP/opus-mt-es-en"
  save_to_disk: true  
  max_input_length: 128
  max_target_length: 128

model_trainer:
  root_dir: artifacts/model_trainer
  model_ckpt: "Helsinki-NLP/opus-mt-es-en" #"Helsinki-NLP/opus-mt-es-en" 
  run_name: "synthetic_dsLarge" #"merged" 
  re_train: false
  project_name: "GEC-Spanish-trainer"
  num_train_epochs: 3
  lr: 2.16e-04 #0.00015888 #0.000028126
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 7
  generation_max_length: 128
  weight_decay: 3.81e-02 #0.0977850 #0.0383990 #0.070
  optim: "adamw_torch"
  fp16: false
  load_best_model: true
  push_to_hub: true
  use_lora: false
  lora_config:
    r: 8
    lora_alpha: 64
    lora_dropout: 0.15
    bias: "none"

model_evaluation:
  root_dir: artifacts/model_evaluation
  model_path: artifacts/model_trainer
  tokenizer_path: artifacts/model_trainer
  source_file: "source.txt"
  gold_file: "gold.txt"
  pred_file: "pred.txt"
  metric_file_name: "metrics.json"

hyperparameter_tuning:
  root_dir: artifacts/hyperparameter_tuning
  source_synthetic: "Ro551/WikiCorrupted_spanish_to_GEC-GED_mini"
  source_cowsl2h: "Ro551/COWSL2H_GEC_cleaned" 
  mode: "hybrid" # puede ser "synthetic", "cowsl2h", "hybrid"
  models_ckpt: ["facebook/mbart-large-50"] #"facebook/mbart-large-50"] "google/mt5-small", "Helsinki-NLP/opus-mt-es-en", 
  project_name: "Hypertuning_GEC-LoRA-dataHybrid"  #"Hypertuning_GEC-dataHybrid"  #
  epochs: 3
  n_trials: 2
  lr: [0.0015, 0.003] #->lora #[0.00015, 0.0003]mt5 # general:[0.00001, 0.001] 
  wd: [0.01, 0.1]
  bs: [1, 2]
  gradient_accumulation_steps: [4, 16]
  use_lora: true
  lora_config:
    lora_alpha: [16, 32, 64, 96]
    lora_dropout: [0.05, 0.15]
    bias: "none"
