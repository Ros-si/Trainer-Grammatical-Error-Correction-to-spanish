artifacts_root: artifacts

data_ingestion:
  root_dir: artifacts/data_ingestion
  source_URL: "Ro551/WikiCorrupted_spanish_to_GEC-GED" #"Ro551/WikiCorrupted_spanish_to_GEC-GED_xs"
  dataset_cache_dir: artifacts/data_ingestion/hf_dataset

data_transformation:
  root_dir: artifacts/data_transformation
  tokenizer_name: "Helsinki-NLP/opus-mt-es-en" #"google/mt5-small" #
  model_id: "marian_mt"
  save_to_disk: true  # cambiar a 'false' cuando se realice hipertuning 
  max_input_length: 128
  max_target_length: 128

model_trainer:
  root_dir: artifacts/model_trainer
  model_ckpt: "Helsinki-NLP/opus-mt-es-en" #"google/mt5-small" #
  run_name: "datSint"
  project_name: "GEC-Spanish-trainer"
  num_train_epochs: 3
  lr: 5e-4
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 2
  optim: "adamw_torch"
  fp16: true
  load_best_model: true
  push_to_hub: true

model_evaluation:
  root_dir: artifacts/model_evaluation
  model_path: artifacts/model_trainer
  tokenizer_path: artifacts/model_trainer
  source_file: "source.txt"
  gold_file: "gold.txt"
  pred_file: "pred.txt"
  metric_file_name: "metrics.json"

hyperparameter_tuning:
  root_dir: artifacts/hiperparameter_tuning
  source_data_URL: "Ro551/WikiCorrupted_spanish_to_GEC-GED_toTEST_mini" 
  models_ckpt: ["Helsinki-NLP/opus-mt-es-en", "google/mt5-small", "facebook/m2m100_418M"]#, "facebook/mbart-large-50"]
  project_name: "Hypertuning_GEC"
  run_name: "dataSint"
  n_trials: 10
  lr: [1e-5, 5e-4]
  wd: [0.0, 0.1]
  bs: [4, 8, 16]