artifacts_root: artifacts

data_ingestion:
  root_dir: artifacts/data_ingestion
  source_URL: "Ro551/WikiCorrupted_spanish_to_GEC-GED_large" #"Ro551/WikiCorrupted_spanish_to_GEC-GED" #"Ro551/Wiki-Corrupted_spanish_to_GEC-GED"
  source_cowsl2h: "Ro551/COWSL2H_GEC_cleaned"
  dataset_cache_dir: artifacts/data_ingestion/hf_dataset
  dataset_test_cache_dir: artifacts/data_ingestion/hf_dataset_test
  mode: "merged" #puede ser "synthetic", "cowsl2h", "merged"

data_transformation:
  root_dir: artifacts/data_transformation
  tokenizer_name: "google/mt5-small" #"Helsinki-NLP/opus-mt-es-en" #"facebook/mbart-large-50" ##"Helsinki-NLP/opus-mt-es-en"  #"facebook/m2m100_418M" #
  model_id: "mt5-small" #"mBart" # #"marianMT" "facebook/m2m100_418M" #"Helsinki-NLP/opus-mt-es-en"
  save_to_disk: true  
  max_input_length: 128
  max_target_length: 128

model_trainer:
  root_dir: artifacts/model_trainer
  model_ckpt: "google/mt5-small" #"Helsinki-NLP/opus-mt-es-en" 
  run_name: "merged" #"synthetic"
  re_train: false
  project_name: "GEC-Spanish-trainer-LoRA" #"GEC-Spanish-trainer-LoRA" #
  num_train_epochs: 3
  lr: 1.746e-4
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 1
  generation_max_length: 128
  weight_decay: 6.647e-2
  optim: "adamw_torch"
  fp16: true
  load_best_model: true
  push_to_hub: true
  use_lora: true
  lora_config:
    r: 64
    lora_alpha: 64
    lora_dropout: 0.05
    bias: "none"

model_evaluation:
  root_dir: artifacts/model_evaluation
  model_path: artifacts/model_trainer
  tokenizer_path: artifacts/model_trainer
  source_file: "source.txt"
  gold_file: "gold.txt"
  pred_file: "pred.txt"
  metric_file_name: "metrics.json"

hyperparameter_tuning:
  root_dir: artifacts/hyperparameter_tuning
  source_synthetic: "Ro551/WikiCorrupted_spanish_to_GEC-GED_mini"
  source_cowsl2h: "Ro551/COWSL2H_GEC_cleaned" 
  mode: "hybrid" # puede ser "synthetic", "cowsl2h", "hybrid"
  models_ckpt: ["google/mt5-small"] #["Helsinki-NLP/opus-mt-es-en", "facebook/mbart-large-50", "facebook/m2m100_418M"] #google/mt5-small",
  project_name: "Hypertuning_GEC-LoRA-dataHybrid" #"Hypertuning_GEC-dataHybrid"  #
  epochs: 3
  n_trials: 5
  lr: [0.00015, 0.0003]  #->lora #[0.00015, 0.0003]mt5 # general:[0.00001, 0.001] 
  wd: [0.01, 0.1]
  bs: [1, 2] #1,2
  gradient_accumulation_steps: [16]
  use_lora: true
  lora_config:
    lora_alpha: [16, 32, 64]
    lora_dropout: [0.05, 0.15]
    bias: "none"
